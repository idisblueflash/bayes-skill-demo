<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>電子報寫作工作流程 · Scriptorium</title>
<link rel="stylesheet" href="colors_and_type.css?v=33" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #14110c;
    background-image: radial-gradient(120% 100% at 50% 0%, #2a2418, #14110c 70%);
    overflow: hidden; -webkit-font-smoothing: antialiased;
    font-family: var(--font-body);
  }
  #stageWrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  /* Full-bleed game screen — the framed "window" chrome is removed. */
  #stage {
    width: 1280px; height: 720px; position: relative; transform-origin: center center;
    background: var(--navy-deep); overflow: hidden;
  }

  /* idle character bob + UI motion */
  @keyframes bob       { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @keyframes pulseHint { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
  @keyframes floatTag  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes popIn     { from { transform: translateY(14px) scale(.985); } to { transform: none; } }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: rgba(163,135,95,0.5); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <div id="stageWrap"><div id="stage"><div id="root"></div></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>window.IMG_V = Math.floor(Date.now() / 60000);</script>
  <script src="data.js?v=33"></script>
  <script type="text/babel" src="Icons.jsx?v=33"></script>
  <script type="text/babel" src="MapStage.jsx?v=33"></script>
  <script type="text/babel" src="Avatar.jsx?v=33"></script>
  <script type="text/babel" src="DemoModal.jsx?v=33"></script>
  <script type="text/babel" src="MainWindow.jsx?v=33"></script>
  <script type="text/babel" src="App.jsx?v=33"></script>
  <script type="text/babel" data-presets="react">
    const Root = window.App;
    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

    // Fixed-stage scaling — letterbox the 1280×720 canvas into any viewport.
    function fitStage() {
      const wrap = document.getElementById("stageWrap");
      const stage = document.getElementById("stage");
      const s = Math.min(wrap.clientWidth / 1280, wrap.clientHeight / 720);
      stage.style.transform = "scale(" + s + ")";
    }
    window.addEventListener("resize", fitStage);
    fitStage();
  </script>
</body>
</html>
